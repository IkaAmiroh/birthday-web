<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday 💖</title>
    <style>
        body {
            margin: 0;
            background: black;
            overflow: hidden;
            font-family: Arial;
        }

        .text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 35px;
            color: pink;
            text-align: center;
            text-shadow: 0 0 20px pink;
        }

        canvas {
            position: absolute;
            top: 0;
        }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="text">
    <span id="typing"></span>
</div>

<script>
const text = [
"HAPPY BIRTHDAY BUBUBKU 💖",
"",
"Tumbuh lebih baik, cari panggilanmu...",
"",
"Jadi lebih baik dibanding diriku ✨",
"",
"Tuk sementara ini aku mengembara jauh,",
"Saat dewasa kau 'kan mengerti"
];

let line = 0;
let char = 0;

function typeEffect() {
    if (line < text.length) {
        if (char < text[line].length) {
            document.getElementById("typing").innerHTML += text[line].charAt(char);
            char++;
            setTimeout(typeEffect, 50);
        } else {
            document.getElementById("typing").innerHTML += "<br>";
            line++;
            char = 0;
            setTimeout(typeEffect, 500);
        }
    }
}

typeEffect();

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "HAPPYBIRTHDAYBUBUBKU";
letters = letters.split("");

let fontSize = 14;
let columns = canvas.width / fontSize;

let drops = [];
for (let x = 0; x < columns; x++)
    drops[x] = 1;

function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "pink";
    ctx.font = fontSize + "px Arial";

    for (let i = 0; i < drops.length; i++) {
        let text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
            drops[i] = 0;

        drops[i]++;
    }
}

setInterval(draw, 33);
</script>

</body>
</html>
